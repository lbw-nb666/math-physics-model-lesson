    .subjects{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}.subjects button{min-height:56px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--muted);font-weight:900;cursor:pointer}.subjects button.active{background:var(--green);color:#fff}.problem-list{display:grid;gap:13px}.problem{padding:21px;border:1px solid var(--line);border-radius:16px;background:var(--card)}.problem.done{opacity:.65;box-shadow:inset 5px 0 #4e8d6b}.meta{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-weight:800}.no{display:grid;place-items:center;width:35px;height:35px;border-radius:10px;background:var(--green);color:white}.role{padding:4px 8px;border-radius:99px;background:#efe9d9;color:#796a48;font-size:10px}.level{margin-left:auto;padding:5px 9px;border-radius:99px;background:#dcecdf;color:#34704e}.level.hard{background:#f8dfce;color:#aa4d26}.source{color:#999084;font-size:11px}.source a{color:#776a5c;font-weight:800;text-underline-offset:3px}.qimg{display:block;width:auto;max-width:min(100%,620px);max-height:330px;margin:17px auto 8px;padding:10px;border:1px solid #e7e0d4;border-radius:12px;background:#fff;object-fit:contain}.question{font-family:Georgia,"Songti SC",serif;font-size:17px;font-weight:650;line-height:1.8}.actions{display:flex;align-items:center;justify-content:space-between}.actions button{border:0;background:transparent;color:#b75028;font-size:13px;font-weight:900;cursor:pointer}.actions label{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}.answer{display:none;margin-top:14px;padding:15px;border-radius:11px;background:#f0eee6;color:#48534d;font-size:13px;line-height:1.75}.answer.open{display:block}.answer p{margin:0}.answer p+p{margin-top:8px}.answer b{margin-right:8px;color:var(--green)}.answer .final{margin-top:13px;padding-top:12px;border-top:1px solid #d8d2c7}.sourcebox{margin-top:28px;padding:22px;border:1px dashed #a99f91;border-radius:16px;background:#e   <script>const DATA={"problems":[{"id":"p1","subject":"物理","topic":"摩擦力方向与平衡","level":"中上","role":"必做","source":"2024年江苏淮安中考物理第1题","sourceUrl":"https://www.jyeoo.com/sj/27c765f4-5722-4004-9a2c-34a719400625","imageUrl":"https://img.jyeoo.net/quiz/images/201812/119/c299cf8e.png","prompt":"如图，用水平拉力F拉动物体A在粗糙水平地面上匀速运动，物体B静止不动。关于A对B的摩擦力及弹簧测力计示数，正确的是：A.A对B的摩擦力水平向左；B.F大于A对B的摩擦力；C.测力计示数等于F；D.B对A的摩擦力水平向右。（不计绳和测力计重）","hints":["先只研究B：它相对A有向哪边滑动的趋势？","给B画水平方向受力图；再给A画水平方向受力图。","B静止说明拉力与摩擦力平衡；A还同时受到地面对它的摩擦力。"],"answer":"选B。A对B的摩擦力向右，测力计拉力向左，二者平衡；B对A的摩擦力向左。A匀速时，F要同时平衡B对A的摩擦力和地面对A的摩擦力，所以F大于A对B的摩擦力。"},{"id":"p2","subject":"物理","topic":"增大与减小摩擦","level":"中上","role":"必做","source":"2024年山东烟台中考物理第12题","sourceUrl":"https://www.jyeoo.com/sj/4ef78acb-1732-4cdc-8d21-6ddca5832d18","prompt":"下列跟摩擦有关的现象或应用中，叙述正确的是：A.车轮、把手、鞋底表面凹凸不平是为了增大有益摩擦；B.运动员赛前在手上擦白色粉末是为了减小有害摩擦；C.磁悬浮列车、气垫船采用使接触面分离的方法减小摩擦；D.车辆急刹车时，采用变滚动为滑动的方法增大摩擦。","hints":["逐项判断目标是‘增大’还是‘减小’摩擦。","从粗糙程度、压力、接触面是否分离、滚动或滑动四个角度判断。","白色粉末用于吸汗、防滑；其目的不是减小摩擦。"],"answer":"A、C、D正确，B错误。运动员使用防滑粉是为了增大有益摩擦。"},{"id":"p3","subject":"物理","topic":"惯性与受力平衡","level":"中上","role":"必做","source":"2024年四川达州中考物理第20题","sourceUrl":"https://www.jyeoo.com/sj/25a2bcf7-0d91-4e7d-8ac0-f0c73584d806","prompt":"一个人通过细绳用20 N的水平拉力拉着小车在光滑水平面上加速运动。如果细绳突然断了，小车将做____运动，这时小车在竖直方向上受力一定____（填“平衡”或“不平衡”，忽略空气作用力）。","hints":["绳断后，先判断小车水平方向还有没有力。","光滑水平面意味着不计摩擦；竖直方向只看重力与支持力。","水平合力为0时，物体保持断绳瞬间的速度；竖直方向合力也为0。"],"answer":"匀速直线运动；平衡。绳断后水平方向不受力，小车因惯性保持原来的运动状态；重力与支持力是一对平衡力。"},{"id":"p4","subject":"物理","topic":"F-t与v-t图像","level":"偏高","role":"必做","source":"2024年黑龙江鹤岗中考物理第14题","sourceUrl":"https://www.jyeoo.com/sj/0944941e-c267-4270-9d6c-31191cfa5f1c","imageUrl":"https://img.jyeoo.net/quiz/images/202307/15/d8d13bf8.png","prompt":"物块受方向不变的水平推力F，F-t图像和v-t图像如图。判断：A.0～2 s物体未被推动，推力等于摩擦力；B.2～4 s摩擦力为3 N；C.4～6 s通过的路程为8 m；D.2～4 s摩擦力与推力是一对平衡力。","hints":["先按0～2 s、2～4 s、4～6 s分段说运动状态。","4～6 s匀速，可先由平衡求滑动摩擦力，再迁移到2～4 s。","路程看v-t图像下方的面积；加速阶段合力不为0。"],"answer":"A、C正确。0～2 s静止，静摩擦力等于1 N推力；4～6 s匀速，滑动摩擦力为2 N，所以2～4 s虽推力为3 N，摩擦力仍为2 N，合力不为0；4～6 s路程为4×2=8 m。"},{"id":"p5","subject":"物理","topic":"追及问题","level":"偏高","role":"选做","source":"2024年黑龙江鹤岗中考物理第34题","sourceUrl":"https://www.jyeoo.com/sj/0944941e-c267-4270-9d6c-31191cfa5f1c","prompt":"小明家距学校8 km，他以15 km/h骑车上学。10 min后妈妈发现他忘带学生证，以25 km/h骑电动车追赶。妈妈能否在小明到校前追上？若能，追上时他们距学校多远？","hints":["先算妈妈出发时小明领先多少千米。","同向追及：追赶时间=领先路程÷速度差。","再用妈妈的路程或小明的总路程求追上地点。"],"answer":"能。小明领先15×(10/60)=2.5 km；速度差为10 km/h，追赶用时2.5÷10=0.25 h。妈妈走25×0.25=6.25 km，所以距学校8-6.25=1.75 km。"},{"id":"p6","subject":"物理","topic":"杠杆实验与图像","level":"偏高","role":"选做","source":"2024年江苏淮安中考物理第20题","sourceUrl":"https://www.jyeoo.com/sj/27c765f4-5722-4004-9a2c-34a719400625","imageUrl":"https://img.jyeoo.net/quiz/images/202210/104/d792ebe7.png","prompt":"利用图示装置探究杠杆平衡条件：（1）实验前杠杆左低右高，平衡螺母应向哪边调？（2）每个钩码50 g，测力计在B点竖直向下拉（a位置）时示数多少；改为斜拉（b位置）示数怎样变化？（3）由l₁-F₁图像推算l₁=0.6 m时F₁。g取10 N/kg。","hints":["平衡螺母向较高的一端调。","先数钩码、格数，用F₁l₁=F₂l₂；斜拉时真正的力臂会变小。","图像体现F₁l₁为定值，可任选图上一组清晰数据求这个定值。"],"answer":"（1）向右；（2）0.6 N，变大；（3）0.5 N。斜拉后动力臂减小，为保持相同力矩，动力需增大。"},{"id":"p7","subject":"物理","topic":"斜面与机械效率","level":"偏高","role":"教师备用","source":"2024年江苏淮安中考物理第9题","sourceUrl":"https://www.jyeoo.com/sj/27c765f4-5722-4004-9a2c-34a719400625","imageUrl":"https://img.jyeoo.net/quiz/images/202110/95/89192cca.png","prompt":"工人用连接在小车上的动滑轮把小车沿斜面匀速拉到平台。斜面长5 m、高2 m，小车重600 N，拉力150 N，两股绳均与斜面平行，不计绳重和绳与滑轮间摩擦。求工人做的功和斜面的机械效率。","hints":["先判断小车上升5 m时自由端移动多少米。","动滑轮由两段绳承担，自由端路程是小车路程的2倍。","W总=Fs，W有=Gh，η=W有/W总。"],"answer":"自由端移动10 m，W总=150×10=1500 J；W有=600×2=1200 J；η=1200÷1500=80%。"},{"id":"p8","subject":"物理","topic":"汽车力学综合","level":"偏高","role":"教师备用","source":"2024年江苏淮安中考物理第17题","sourceUrl":"https://www.jyeoo.com/sj/27c765f4-5722-4004-9a2c-34a719400625","prompt":"一辆总重1.6×10⁴ N的汽车在高速公路上匀速行驶20 km，所受平均阻力1.4×10³ N，车轮与地面接触总面积0.08 m²。求：（1）静止时对地面的压强；（2）牵引力做的功；（3）发动机废气带走4.2×10⁷ J热量，可使多少m³的水升高50 ℃？c水=4.2×10³ J/(kg·℃)。","hints":["三个小问分别归到压强、功、热量，不要混在一起。","匀速意味着牵引力等于阻力；20 km先换成米。","p=F/S，W=Fs，Q=cmΔt，最后由ρ=m/V求体积。"],"answer":"（1）p=1.6×10⁴÷0.08=2.0×10⁵ Pa；（2）F牵=1.4×10³ N，W=1.4×10³×2×10⁴=2.8×10⁷ J；（3）m=4.2×10⁷÷(4.2×10³×50)=200 kg，V=0.20 m³。"},{"id":"m1","subject":"数学","topic":"折叠模型：中垂线","level":"中上","role":"必做","source":"2024年山东潍坊中考数学第17题","sourceUrl":"https://www.jyeoo.com/sj/2bb3fc41-1247-4472-8ee7-dc8a1aff79ac","imageUrl":"https://img.jyeoo.net/quiz/images/svg/202305/448/2dbf1c75.png","prompt":"把矩形纸片ABCD按图折叠，使顶点B与D重合，折痕为EF，且AB=4，BC=6。（1）证明DE=DF；（2）求DE。","hints":["折痕上的点到折叠前后的对应点距离相等。","由折叠得EB=ED、FB=FD；再利用矩形边长建立直角三角形。","设AE=x，则ED=6-x；在Rt△AEB中用EB²=AE²+AB²。"],"answer":"折叠得EB=ED、FB=FD；又AB=CD、∠A=∠C=90°，可由直角三角形关系证明DE=DF。设AE=x，则ED=6-x，EB²=x²+4²，而EB=ED，所以x²+16=(6-x)²，得x=5/3，DE=13/3。"},{"id":"m2","subject":"数学","topic":"折叠＋解直角三角形","level":"偏高","role":"必做","source":"2024年黑龙江大庆中考数学第10题","sourceUrl":"https://www.jyeoo.com/sj/3f1ca79a-3d35-41a6-8d38-5a1a35b83391","imageUrl":"https://img.jyeoo.net/quiz/images/svg/202206/351/90b2dc24.png","prompt":"折叠矩形ABCD的一边AD，使点D落在BC边的点F处。若CF=4，tan∠EFC=3/4，求折痕AE。选项：A.4√5；B.5√5；C.8；D.10。","hints":["先在Rt△EFC中由正切求EC，再用勾股求EF。","折叠对应：ED=EF，AD=AF。","先求矩形高DC，再设AD=BC=x，在Rt△ABF中列AF=AD。"],"answer":"tan∠EFC=EC/CF=3/4，故EC=3、EF=5；折叠得ED=EF=5，所以DC=8。设AD=BC=x，则BF=x-4，且AF=AD=x，于是x²=8²+(x-4)²，得x=10。AE=√(10²+5²)=5√5，选B。"},{"id":"m3","subject":"数学","topic":"平行＋角平分线模型","level":"偏高","role":"选做","source":"2024年江苏苏州中考数学第17题","sourceUrl":"https://www.jyeoo.com/sj/177573e0-951d-4f29-8ccb-b84789ffb9cd","imageUrl":"https://img.jyeoo.net/quiz/images/202105/84/65a9c926.png","prompt":"四边形ABCD中，∠B=90°，AD∥BC，AD=CD。（1）尺规作∠ADC的平分线；（2）平分线交BC于F，连接AF，判断四边形AFCD是哪种特殊平行四边形并证明。","hints":["先按标准方法作角平分线。","利用AD∥FC，把角平分线产生的角转移到△DCF中。","证明FC=CD=AD，再用‘一组对边平行且相等’判定平行四边形。"],"answer":"四边形AFCD是菱形。由DF平分∠ADC，得∠ADF=∠FDC；又AD∥FC，得∠ADF=∠DFC，所以∠FDC=∠DFC，FC=CD。已知CD=AD，故FC=AD；又FC∥AD，所以AFCD为平行四边形，且相邻边AD=CD，因此为菱形。"},{"id":"m4","subject":"数学","topic":"方向角与解三角形","level":"偏高","role":"选做","source":"2024年黑龙江大庆中考数学第27题","sourceUrl":"https://www.jyeoo.com/sj/3f1ca79a-3d35-41a6-8d38-5a1a35b83391","imageUrl":"https://img.jyeoo.net/quiz/images/201506/226/13d41467.png","prompt":"渔船在小岛O南偏东75°方向的B处遇险；渔政船在O南偏西45°方向的A处巡航，AO=8海里，且B在A的正东方。求∠BAO、∠ABO；若渔政船以28海里/时沿AB救援，能否在1小时内赶到？（tan15°≈0.27，√2≈1.41）","hints":["把南偏东75°转成‘东偏南15°’，并画出正南、正东辅助线。","从O向AB作垂线，得到一个45°直角三角形和一个15°直角三角形。","先求垂距和两段水平距离，再与28海里比较。"],"answer":"∠BAO=45°，∠ABO=15°。作OD⊥AB，则AD=OD=AO·sin45°=4√2≈5.64；BD=OD/tan15°≈20.89，所以AB≈26.53海里＜28海里，能在1小时内赶到。"},{"id":"m5","subject":"数学","topic":"双观测点测距","level":"偏高","role":"教师备用","source":"2024年江苏苏州中考数学第25题","sourceUrl":"https://www.jyeoo.com/sj/177573e0-951d-4f29-8ccb-b84789ffb9cd","prompt":"某兴趣小组测量解放桥全长PQ。在观景平台M处测得∠PMQ=54°，沿河岸MQ前行到N处测得∠PNQ=73°。已知PQ⊥MQ，MN=40 m，tan54°≈1.4，tan73°≈3.3，求PQ（结果保留整数）。","hints":["设NQ=x，则MQ=x+40。","在两个直角三角形中，PQ是共同的对边。","分别写PQ=(x+40)tan54°和PQ=x·tan73°。"],"answer":"设NQ=x，则1.4(x+40)=3.3x，解得x≈29.47；PQ=3.3x≈97.26 m，所以桥长约97 m。"},{"id":"m6","subject":"数学","topic":"反比例函数：点与k","level":"中上","role":"必做","source":"2024年黑龙江大庆中考数学第14题","sourceUrl":"https://www.jyeoo.com/sj/3f1ca79a-3d35-41a6-8d38-5a1a35b83391","prompt":"点P(a，1)在反比例函数y=2/x的图象上，求a。","hints":["把点的横、纵坐标代入函数。","反比例函数图象上的点满足xy=k。","a×1=2。"],"answer":"a=2。这题只作为2分钟启动题，要求学生口述‘图象上的点满足xy=k’，不能只报答案。"},{"id":"m7","subject":"数学","topic":"反比例函数：矩形面积","level":"中上","role":"必做","source":"2024年江苏苏州中考数学第22题","sourceUrl":"https://www.jyeoo.com/sj/177573e0-951d-4f29-8ccb-b84789ffb9cd","imageUrl":"https://img.jyeoo.net/quiz/images/svg/202304/325/b2b70496.png","prompt":"A(-2，y₁)、B(-6，y₂)在反比例函数y=k/x（k＜0）上，AC⊥x轴，BD⊥y轴，AC与BD交于E。（1）比较y₁、y₂并计算验证；（2）从条件①四边形OCED面积为2，或条件②BE=2AE中任选一个，求k。","hints":["先结合k＜0判断图象位于哪些象限，再代入横坐标表示y₁、y₂。","写出y₁=-k/2、y₂=-k/6，并在图上标出矩形的长和宽。","条件①：S=2·y₂；条件②：BE=4，AE=y₁-y₂。"],"answer":"y₁=-k/2，y₂=-k/6；因k＜0，所以y₁＞y₂。条件①：S四边形OCED=2·(-k/6)=-k/3=2，得k=-6。条件②：BE=4，AE=-k/3；4=2·(-k/3)，也得k=-6。"},{"id":"m8","subject":"数学","topic":"一次函数＋反比例函数","level":"偏高","role":"选做","source":"2024年山东潍坊中考数学第19题","sourceUrl":"https://www.jyeoo.com/sj/2bb3fc41-1247-4472-8ee7-dc8a1aff79ac","imageUrl":"https://img.jyeoo.net/quiz/images/svg/202208/469/209e4cb8.png","prompt":"一次函数y₁=kx+b与反比例函数y₂=6/x交于A(1，m)、B(n，-2)。（1）求一次函数表达式；（2）当x＞0时，写出y₁＞y₂的x范围；（3）把一次函数图象平移使其过原点，写出一个与平移后直线无交点的反比例函数。","hints":["先分别把A、B代入y=6/x求完整坐标。","利用两点求直线；函数大小可直接看图中谁在上方。","平移后直线斜率不变且过原点；让联立方程没有实数解。"],"answer":"A(1，6)，B(-3，-2)，一次函数为y=2x+4。x＞0时，y₁＞y₂的范围是x＞1。平移后直线为y=2x；例如取反比例函数y=-1/x，联立得2x²=-1，无实数解。"},{"id":"m9","subject":"数学","topic":"反比例函数＋矩形＋三角函数","level":"偏高","role":"教师备用","source":"2024年江苏苏州中考数学第7题","sourceUrl":"https://www.jyeoo.com/sj/177573e0-951d-4f29-8ccb-b84789ffb9cd","imageUrl":"https://img.jyeoo.net/quiz/images/201807/26/f85ae897.png","prompt":"矩形ABCD的A、B在x轴正半轴，反比例函数y=k/x在第一象限经过D并交BC于E。若AB=4，CE=2BE，tan∠AOD=3/4，求k。选项：A.3；B.2√3；C.6；D.12。","hints":["设OA=4t、AD=3t，把正切条件参数化。","D在双曲线上，所以k=OA·AD；再由CE=2BE求BE。","E也在双曲线上，把E的横、纵坐标相乘并与D处的k相等。"],"answer":"设OA=4t、AD=3t，则OD所在直角三角形满足tan∠AOD=3/4。因CE=2BE且BC=AD=3t，所以BE=t。D给出k=4t·3t=12t²；E给出k=(4t+4)t。两式相等得t=1/2，所以k=3，选A。"}],"physicsMap":[["机械运动","参照物 → 速度单位 → 平均速度 → s-t/v-t图像 → 追及与相遇"],["力与运动","确定研究对象 → 画受力图 → 看运动状态 → 平衡/非平衡 → 摩擦与惯性"],["压强与浮力","压力与受力面积 → 液体压强 → 浮力来源 → 阿基米德原理 → 物体浮沉"],["功与机械","找力与对应距离 → W=Fs → P=W/t → 杠杆/滑轮/斜面 → 机械效率"],["其他板块","声、光、热、质量密度先做概念快检；电学留到初三新课后系统建立。"]],"mathModels":[{"mark":"折","title":"折叠模型","trigger":"点翻折到另一点、出现折痕","chain":"对应点连线的垂直平分线 → 距离相等 → 勾股/相似","trap":"只看图形像相等，不写折叠依据"},{"mark":"平","title":"平行转角","trigger":"平行线＋角平分线/中点","chain":"平行转移角 → 等角/相似 → 等腰或比例 → 四边形判定","trap":"对应角方向写反"},{"mark":"A","title":"A字型相似","trigger":"三角形内部一条线平行于一边","chain":"AA相似 → 对应边成比例 → 面积比为相似比平方","trap":"部分边与整边混淆"},{"mark":"X","title":"X字型相似","trigger":"两直线相交＋一组平行","chain":"对顶角＋内错角 → AA相似 → 线段乘积/面积比","trap":"对应顶点顺序错位"},{"mark":"锐","title":"解直角三角形","trigger":"仰角、方向角、坡度、双观测点","chain":"补垂线 → 标已知边角 → 选sin/cos/tan → 方程","trap":"方位角基准线和水平距离混淆"},{"mark":"k","title":"反比例函数","trigger":"双曲线上点、轴垂线、一次函数交点","chain":"xy=k → 面积不变量 → 联立 → 看图比较 → 几何综合","trap":"忘记象限、x≠0和不等式分区间"}],"lessonFlow":[["0—8 min","低压回忆","用P3和M6口答启动，只要求说明依据；先让她体验能独立完成。"],["8—35 min","物理示范—模仿","教师完整示范P1的研究对象与受力图；学生用同样流程独立做P2，至少静默尝试3分钟。"],["35—58 min","物理图像迁移","做P4。只有卡住时按一级、二级、三级提示逐步开放，并记录最高提示等级。"],["58—75 min","相似/折叠升级","M1必做，状态好再做M2；每一步先口述‘依据是什么’，再写等式。"],["75—103 min","反比例函数阶梯","按M6→M7→M8推进；M6必须独立，M7允许一级提示，M8作为迁移。"],["103—120 min","回做与复盘","从刚才提示最多的一题中抽走提示重新做；作业只留1道物理同模型＋2道数学，不追求数量。"]],"teachingRules":[["先独立","每题先给3—5分钟静默尝试。老师只问‘你现在要求什么量？’不直接报模型。"],["分级提示","一级：审题目标；二级：画图/选研究对象；三级：关系式骨架。记录最高用到哪一级。"],["同模三步","教师示范1题 → 学生模仿1题 → 隔20分钟独立迁移1题。只有迁移成功才算真正会。"],["控制题量","物理一节课精做3—4题即可；数学做4—5题。宁可完整复盘，也不要赶题。"],["判定进步","连续两题只需一级提示，下一次才加难；仍需三级提示，则保持难度并换同模型真题。"],["错因标签","只记四类：审题、画图/建模、关系式、计算。下节课先回测出现次数最多的一类。"]]};
    const state={view:"plan",subject:"物理",done:JSON.parse(localStorage.getItem("lesson-done-v3")||"[]")};
    const app=document.querySelector("#app");
    const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    function heading(en,title,sub){return '<div class="heading"><p class="eyebrow">'+en+'</p><h2>'+title+'</h2><span>'+sub+'</span></div>'}
    function renderPlan(){app.innerHTML=heading("LEARNING REVIEW","这次暴露的核心问题","难点不在概念背诵，而在独立把文字转成模型。")+'<div class="version"><b>学情结论</b><br>物理50分钟只完成前5题且几乎都需要老师提供思路，当前不宜继续整体加难。她更像是<strong>概念熟悉、程序不熟</strong>：不会主动选择研究对象、画受力图、把运动状态翻译成平衡关系。数学相似图形和应用题可以提高半档；反比例函数要在面积不变量和一次函数联动处专门搭桥。</div><div class="strategy">'+DATA.teachingRules.map((x,i)=>'<article><i>'+(i+1)+'</i><div><h3>'+esc(x[0])+'</h3><p>'+esc(x[1])+'</p></div></article>').join("")+'</div>'+heading("NEXT LESSON","下一节怎么上","物理重质量、数学做阶梯；不把做完题数当目标。")+'<div class="flow">'+DATA.lessonFlow.map((x,i)=>'<article><div class="time">'+String(i+1).padStart(2,"0")+' · '+esc(x[0])+'</div><div><h3>'+esc(x[1])+'</h3><p>'+esc(x[2])+'</p></div></article>').join("")+'</div>'}
    function renderMap(){app.innerHTML='<section class="map-section">'+heading("KNOWLEDGE MAP","先搭骨架，再做真题","物理定位对象—状态—关系；数学定位触发图形。")+'<h3>物理全板块主线</h3><div class="physics-map">'+DATA.physicsMap.map((x,i)=>'<article><i>'+(i+1)+'</i><div><h4>'+esc(x[0])+'</h4><p>'+esc(x[1])+'</p></div></article>').join("")+'</div><h3>数学模型识别卡</h3><div class="models">'+DATA.mathModels.map(x=>'<article class="model"><header><b>'+esc(x.mark)+'</b><h4>'+esc(x.title)+'</h4></header><dl><dt>触发</dt><dd>'+esc(x.trigger)+'</dd><dt>链条</dt><dd>'+esc(x.chain)+'</dd><dt>易错</dt><dd>'+esc(x.trap)+'</dd></dl></article>').join("")+'</div><div class="method"><b>三级提示口令</b>①要求什么 → ②画什么图/研究谁 → ③写哪条关系。不要一次把三级提示全部说完。</div></section>'}
    function renderQuestions(){const qs=DATA.problems.filter(x=>x.subject===state.subject);app.innerHTML=heading("REAL EXAM PRACTICE","公开中考真题题组","原题文字转录，图示保留；教师备用题不建议当堂强推。")+'<div class="subjects"><button data-subject="物理" class="'+(state.subject==="物理"?"active":"")+'">物理 · '+DATA.problems.filter(x=>x.subject==="物理").length+'题</button><button data-subject="数学" class="'+(state.subject==="数学"?"active":"")+'">数学 · '+DATA.problems.filter(x=>x.subject==="数学").length+'题</button></div><div class="problem-list">'+qs.map((q,i)=>'<article class="problem '+(state.done.includes(q.id)?"done":"")+'"><div class="meta"><span class="no">'+String(i+1).padStart(2,"0")+'</span><span>'+esc(q.topic)+'</span><i class="role">'+esc(q.role)+'</i><b class="level '+(q.level==="偏高"?"hard":"")+'">'+q.level+'</b></div><p class="source">真题来源：<a href="'+esc(q.sourceUrl)+'" target="_blank" rel="noreferrer">'+esc(q.source)+' ↗</a></p>'+(q.imageUrl?'<img class="qimg" src="'+esc(q.imageUrl)+'" alt="'+esc(q.source)+'题图" loading="lazy">':'')+'<p class="question">'+esc(q.prompt)+'</p><div class="actions"><button data-answer="'+q.id+'">打开分级提示与解析</button><label><input data-done="'+q.id+'" type="checkbox" '+(state.done.includes(q.id)?"checked":"")+'>已完成</label></div><div class="answer" id="answer-'+q.id+'"><p><b>一级提示</b>'+esc(q.hints[0])+'</p><p><b>二级提示</b>'+esc(q.hints[1])+'</p><p><b>三级提示</b>'+esc(q.hints[2])+'</p><p class="final"><b>答案解析</b>'+esc(q.answer)+'</p></div></article>').join("")+'</div><div class="sourcebox"><h3>使用建议</h3><p>题目均来自所标注的公开中考原卷，不再使用AI自拟数字。物理一次只选3—4题，数学选4—5题，并记录学生使用到的最高提示等级。</p></div>'}
    function render(){document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view));document.querySelector("#count").textContent=state.done.length+"/"+DATA.problems.length;state.view==="plan"?renderPlan():state.view==="map"?renderMap():renderQuestions()}
    document.addEventListener("click",e=>{const v=e.target.closest("[data-view]");if(v){state.view=v.dataset.view;render();return}const s=e.target.closest("[data-subject]");if(s){state.subject=s.dataset.subject;render();return}const a=e.target.closest("[data-answer]");if(a){const box=document.querySelector("#answer-"+a.dataset.answer);box.classList.toggle("open");a.textContent=box.classList.contains("open")?"收起分级提示":"打开分级提示与解析"}});
    document.addEventListener("change",e=>{if(!e.target.dataset.done)return;const id=e.target.dataset.done;state.done=e.target.checked?[...new Set([...state.done,id])]:state.done.filter(x=>x!==id);localStorage.setItem("lesson-done-v3",JSON.stringify(state.done));render()});render();
  </script>
</body></html>
