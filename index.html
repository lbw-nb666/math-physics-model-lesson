  <script>const DATA={"problems":[{"id":"p1","subject":"物理","topic":"s-t表格与变速运动","level":"中上","source":"近年中考图像题母题·重组","prompt":"甲、乙从同一点同时沿直线运动，位置数据如下：t/s：0，10，20，30，40；s甲/m：0，60，140，240，360；s乙/m：0，90，180，270，360。①求两者前20 s的平均速度；②判断各自的运动特点；③若40 s后都保持最后10 s内的速度，谁先到达400 m处？","hint":"平均速度只看总路程÷总时间；运动特点要逐段比较相同时间内通过的路程。","answer":"①v甲=140÷20=7 m/s，v乙=180÷20=9 m/s。②甲每10 s通过60、80、100、120 m，越来越快；乙每10 s均通过90 m，做匀速直线运动。③40 s后甲按12 m/s，还需40÷12≈3.33 s；乙按9 m/s，还需40÷9≈4.44 s，所以甲先到。"},{"id":"p2","subject":"物理","topic":"列车过桥模型","level":"中上","source":"中考运动学高频母题·改编","prompt":"一列长180 m的列车以72 km/h的速度匀速通过长820 m的隧道。从车头进入隧道到车尾完全离开隧道需要多少秒？若列车完全在隧道内的时间为多少秒？","hint":"画出车头的起点和终点。两个问法对应的路程分别是“隧道长+车长”和“隧道长−车长”。","answer":"72 km/h=20 m/s。完全通过时车头走1000 m，用时50 s；列车完全在隧道内时，车头从距入口180 m处走到出口，共走820−180=640 m，用时32 s。"},{"id":"p3","subject":"物理","topic":"追及与相遇","level":"中上","source":"各地中考行程综合题型·改编","prompt":"小明骑车以6 m/s匀速经过校门，30 s后小华从校门出发，以10 m/s沿同方向追赶。小华出发后多久追上？追上处距校门多远？若小华出发5 min后必须返回，返回速度仍为10 m/s，他最晚应在出发后多久停止追赶才能按时回到校门？","hint":"先算领先路程；第二问把“去程路程=返程路程”写出来。","answer":"小明领先6×30=180 m，相对速度10−6=4 m/s，45 s追上，地点距校门10×45=450 m。若小华追赶t秒后返回，总时间t+10t÷10=2t≤300，所以t≤150 s。最晚追赶150 s后返回。"},{"id":"p4","subject":"物理","topic":"传送带与摩擦力","level":"偏高","source":"中考力与运动辨析题型·改编","prompt":"水平传送带向右匀速运动，把一个原来静止的木块轻放在传送带上。请判断木块刚放上时、速度逐渐增大时、最终与传送带同速后三个阶段中，木块所受摩擦力的方向和是否可能为零，并说明理由。","hint":"摩擦力阻碍的是接触面之间的相对运动或相对运动趋势，不一定阻碍物体整体运动。","answer":"刚放上及尚未同速时，木块相对传送带向左滑，受向右的滑动摩擦力，因此加速；达到同速后若传送带仍匀速且无其他水平力，木块没有相对运动趋势，摩擦力为0。"},{"id":"p5","subject":"物理","topic":"摩擦力图像","level":"偏高","source":"实验探究/图像综合母题·改编","prompt":"用水平力F拉重20 N的木块。F从0逐渐增大：当F≤5 N时木块静止；F增至6 N时木块恰好即将运动；木块滑动后，保持匀速所需拉力为4 N。①分别求F=3 N、5 N、恰好即将运动以及匀速滑动时的摩擦力；②说明最大静摩擦力与滑动摩擦力的大小关系；③若匀速时把木块上再放一个重10 N的物体，接触面粗糙程度不变，拉力应怎样变化？","hint":"静止和匀速都属于平衡状态，但静摩擦力会随外力变化。","answer":"①依次为3 N、5 N、约6 N、4 N，方向均与运动或运动趋势相反。②最大静摩擦力约6 N，大于滑动摩擦力4 N。③压力由20 N变30 N，为原来的1.5倍，粗糙程度不变时滑动摩擦力近似增为1.5倍，匀速拉力约6 N。"},{"id":"p6","subject":"物理","topic":"压强与切割","level":"偏高","source":"中考固体压强经典模型·改编","prompt":"质量分布均匀的实心长方体，底面积为S、高为h，放在水平桌面上。沿竖直方向切去一半后，剩余部分对桌面的压力和压强如何变化？沿水平方向切去上半部分后又如何变化？若把切下的上半部分叠在剩余部分上，压强怎样变化？","hint":"始终抓住p=F/S；竖切时F和S同比例变化，横切时S不变。","answer":"竖切一半：压力减半、受力面积减半，压强不变。横切上半：压力减半、面积不变，压强减半。把上半叠回去：总压力恢复原值、底面积仍为S，压强恢复原值。"},{"id":"p7","subject":"物理","topic":"浮力与密度","level":"中上","source":"中考浮力测密度母题·改编","prompt":"一个金属块挂在弹簧测力计下，空气中示数为7.8 N，完全浸没在水中示数为6.8 N（水的密度1.0×10³ kg/m³，g取10 N/kg）。求金属块受到的浮力、体积和密度。若改浸没在某液体中示数为6.6 N，求该液体密度。","hint":"称重法F浮=G−F示；完全浸没时V排=V物。","answer":"水中浮力1.0 N；V=F浮/(ρ水g)=1÷(1000×10)=1.0×10⁻⁴ m³；m=G/g=0.78 kg，ρ物=0.78÷10⁻⁴=7.8×10³ kg/m³。未知液体中浮力1.2 N，ρ液=1.2/(10×10⁻⁴)=1.2×10³ kg/m³。"},{"id":"p8","subject":"物理","topic":"杠杆—浮力联动","level":"偏高","source":"中考力学压轴常见联动模型·改编","prompt":"轻质杠杆可绕O转动，OA=20 cm，OB=30 cm。A端挂重6 N的金属块，B端挂一物体使杠杆水平平衡。①B端物体重多少？②把A端金属块完全浸没在水中后，测得浮力2 N；若仍要水平平衡，B端物体应向O移动多少厘米？","hint":"浸水后A端对杠杆的拉力是“视重”G−F浮。","answer":"①6×20=GB×30，GB=4 N。②A端拉力变为4 N。设B端新力臂x，则4×20=4x，x=20 cm，因此从30 cm处向O移动10 cm。"},{"id":"p9","subject":"物理","topic":"滑轮组效率与功率","level":"偏高","source":"近年中考机械综合题型·改编","prompt":"用滑轮组在20 s内把重600 N的物体匀速提升2 m，自由端移动6 m，拉力为250 N。求有用功、总功、机械效率和拉力功率。若不计绳重和摩擦，求动滑轮重。","hint":"η=W有/W总；由s=nh先确定承担物重的绳子段数n。","answer":"W有=600×2=1200 J；W总=250×6=1500 J；η=80%；P=1500÷20=75 W。n=s/h=3；理想关系F=(G物+G动)/3，所以G动=3×250−600=150 N。"},{"id":"m1","subject":"数学","topic":"A字型：平行线相似","level":"中上","source":"中考相似三角形高频母题·改编","prompt":"在△ABC中，D、E分别在AB、AC上，DE∥BC，AD∶DB=2∶1，△ADE的面积为16。求△ABC的面积和四边形DBCE的面积。若DE=6，再求BC。","hint":"线段比先转成相似比，再用面积比等于相似比的平方。","answer":"AD/AB=2/3，△ADE∽△ABC，相似比2∶3，面积比4∶9。SABC=16×9/4=36，四边形面积36−16=20。DE/BC=2/3，所以BC=9。"},{"id":"m2","subject":"数学","topic":"X字型：梯形对角线","level":"中上","source":"各地中考相似模型题型·改编","prompt":"梯形ABCD中，AD∥BC，两条对角线AC、BD交于O。已知AD=6，BC=10，AO=9，S△AOD=27。求OC与S△BOC。","hint":"找△AOD与△COB：一组对顶角、两组平行线内错角。","answer":"△AOD∽△COB，AO/OC=AD/BC=3/5，所以OC=15。两三角形相似比为3∶5，面积比9∶25，因此S△BOC=27×25/9=75。"},{"id":"m3","subject":"数学","topic":"母子型：直角三角形射影","level":"偏高","source":"相似三角形经典模型·真题常用","prompt":"在Rt△ABC中，∠ACB=90°，AC=6，BC=8，CD⊥AB于D。求AB、AD、BD、CD，并写出本题出现的三组三角形相似关系。","hint":"由高把大直角三角形分成两个小直角三角形，它们彼此相似且都与大三角形相似。","answer":"AB=10。△ACD∽△ABC∽△CBD。由AC²=AD·AB得AD=36/10=3.6；BD=10−3.6=6.4；由CD=AC·BC/AB得CD=4.8。"},{"id":"m4","subject":"数学","topic":"相似测量：镜面法","level":"中上","source":"中考实际测量题型·改编","prompt":"一名学生身高1.6 m，眼睛距头顶0.1 m。她站在一面水平放置的小镜子前2 m处，恰好从镜中看到路灯顶端；镜子距路灯底部12 m。求路灯高度（忽略地面起伏）。","hint":"实际参与相似的是眼睛高度，不是身高；入射角等于反射角形成两直角三角形相似。","answer":"眼睛离地1.6−0.1=1.5 m。由相似得H/12=1.5/2，所以H=9 m。"},{"id":"m5","subject":"数学","topic":"相似测量：河宽","level":"偏高","source":"中考测距模型·改编","prompt":"为测河宽AB（A、B分别在两岸且AB⊥河岸），在B所在的直线河岸上依次取C、D，使BC=24 m、CD=10 m。过C作CE⊥河岸（E在陆地一侧），连接AD并使其经过E。实测CE=15 m。求河宽AB。（先画出图形并辨认相似三角形。）","hint":"B、C、D共线，AB∥CE，A、E、D共线；比较△ABD与△ECD。","answer":"△ABD∽△ECD，AB/CE=BD/CD=(24+10)/10=34/10，所以AB=15×3.4=51 m。"},{"id":"m6","subject":"数学","topic":"解直角三角形：双观测点","level":"中上","source":"中考仰角测高高频题型·改编","prompt":"在同一直线上有A、B、C三点，B在A与C之间，AB=20 m。观测楼顶D，测得∠DAC=30°，∠DBC=60°，且楼底C、楼顶D在同一竖直线上。求BC与楼高CD（观测点高度忽略）。","hint":"设BC=x，则AC=x+20；用同一个楼高写两个正切关系。","answer":"设BC=x，则CD=x·tan60°=x√3；同时CD=(x+20)tan30°=(x+20)/√3。故3x=x+20，x=10，CD=10√3 m。"},{"id":"m7","subject":"数学","topic":"解直角三角形：坡度与行程","level":"偏高","source":"中考坡度应用母题·改编","prompt":"某山坡坡角为30°，沿坡面从A到B走了200 m；随后沿坡角为45°的另一段坡面从B到C又走100√2 m。两段均向上且在同一竖直平面内。求C点比A点升高多少米，以及两段坡在水平方向上的总投影长度。","hint":"每段坡面都是斜边，分别求竖直分量和水平分量。","answer":"升高=200sin30°+100√2sin45°=100+100=200 m。水平投影=200cos30°+100√2cos45°=100√3+100 m。"},{"id":"m8","subject":"数学","topic":"反比例函数：交点与面积","level":"中上","source":"近年中考函数—几何综合母题·改编","prompt":"直线y=−x+5与反比例函数y=k/x（x＞0）交于A、B两点，A、B的横坐标分别为1和4。求k、A和B的坐标，以及△AOB的面积。","hint":"先由直线求交点纵坐标；三角形面积可用大直角三角形减去两边小三角形，或用坐标面积公式。","answer":"A(1,4)，B(4,1)，代入得k=4。S△AOB=|1×1−4×4|/2=15/2。"},{"id":"m9","subject":"数学","topic":"反比例函数：矩形不变量","level":"中上","source":"反比例函数核心模型·真题常用","prompt":"点P(a,b)在第一象限的反比例函数y=12/x上，过P分别作两坐标轴的垂线，与坐标轴围成矩形OAPB。①证明矩形面积不随P移动而变化；②若矩形周长为14，求P坐标；③周长能否为12？说明理由。","hint":"ab=12；周长条件转成a+b。再利用(a−b)²≥0判断最小值。","answer":"①S=ab=12。②a+b=7且ab=12，所以a、b为方程t²−7t+12=0的两根，P为(3,4)或(4,3)。③不能。由(a−b)²≥0得(a+b)²≥4ab=48，所以a+b≥4√3＞6，周长2(a+b)＞12。"},{"id":"m10","subject":"数学","topic":"反比例函数：一次函数联动","level":"偏高","source":"中考函数综合压轴前置题·改编","prompt":"一次函数y=x−2与反比例函数y=k/x交于第一象限点A(4,m)，并在第三象限交于B。①求k及B坐标；②点P在x轴上，若S△PAB=9，求P的坐标。","hint":"先联立得到另一交点。以AB为底不方便，可把P设为(p,0)并使用坐标面积公式。","answer":"A(4,2)，k=8。联立x−2=8/x，得x²−2x−8=0，x=4或−2，所以B(−2,−4)。设P(p,0)，S=|4(−4−0)+(−2)(0−2)+p(2+4)|/2=|6p−12|/2=|3p−6|。令其为9，得p=5或p=−1，所以P(5,0)或(−1,0)。"}],"physicsMap":[["机械运动","参照物 → s-t/v-t信息 → 速度与平均速度 → 追及、过桥"],["力与运动","画受力图 → 平衡力/相互作用力 → 惯性 → 摩擦力状态判断"],["压强与浮力","p=F/S → 液体压强 → 阿基米德原理 → 漂浮/悬浮/沉底"],["功与机械","W=Fs → P=W/t → 杠杆/滑轮 → 有用功、额外功、效率"],["其他板块","声、光、热、质量密度、电学（初三重点）——明日只做快速定位"]],"mathModels":[{"mark":"A","title":"A字型","trigger":"三角形内有平行线","chain":"平行 → 对应角相等 → AA相似 → 线段比/面积比","trap":"AD:DB 不是 AD:AB"},{"mark":"X","title":"X字型","trigger":"两线相交＋一组平行","chain":"对顶角＋内错角 → AA相似","trap":"对应顶点顺序写反"},{"mark":"母","title":"母子型/射影","trigger":"直角三角形斜边上的高","chain":"三个三角形两两相似 → a²=投影×斜边","trap":"把直角边与错误投影对应"},{"mark":"测","title":"测高测距","trigger":"影子、镜面、标杆、河宽","chain":"把实物抽象成相似三角形 → 统一单位 → 比例","trap":"镜面法使用眼高而非身高"},{"mark":"锐","title":"解直角三角形","trigger":"仰角、俯角、坡度、方向角","chain":"先补直角三角形 → 选sin/cos/tan → 方程","trap":"仰角位置、水平距离与斜距混淆"},{"mark":"k","title":"反比例函数","trigger":"双曲线上点＋坐标轴垂线/一次函数","chain":"xy=k → 矩形面积不变量 → 联立求交点 → 面积","trap":"忽略象限与k的符号"}],"lessonFlow":[["0—10 min","版本与进度校准","让学生说本学期章名；用1道反比例函数交点题＋1道受力判断题定位。"],["10—30 min","物理知识树","从运动一路追问到力、压强浮力、功和机械；只补关键概念，不平均用力。"],["30—65 min","物理主练","P1/P2热身，P4/P5辨析，P8或P9拔高；要求先画图、再列式。"],["65—85 min","相似模型课","用A、X、母子三张模型卡；每题先说触发特征与对应边。"],["85—110 min","数学应用","M6双观测点＋M8/M10函数几何；根据状态选一题偏高。"],["110—120 min","复盘与作业","让学生口述：今天最容易漏的三个条件；布置2物理＋2数学变式。"]]};
    const state={view:"plan",subject:"物理",done:JSON.parse(localStorage.getItem("lesson-done")||"[]")};
    const app=document.querySelector("#app");
    const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    function heading(en,title,sub){return '<div class="heading"><p class="eyebrow">'+en+'</p><h2>'+title+'</h2><span>'+sub+'</span></div>'}
    function renderPlan(){app.innerHTML=heading("LESSON PLAN","明天怎么上","建议以“模型识别＋迁移”代替大段知识复述。")+'<div class="version"><b>进度判断</b><br>“初二升初三、反比例函数快学完”与<strong>浙教版八下</strong>最吻合：本学期通常学过二次根式、一元二次方程、数据分析、平行四边形与特殊平行四边形、反比例函数。相似三角形和解直角三角形更像后续预习内容。若使用人教版，开课前请先确认教材章节。</div><div class="flow">'+DATA.lessonFlow.map((x,i)=>'<article><div class="time">'+String(i+1).padStart(2,"0")+' · '+esc(x[0])+'</div><div><h3>'+esc(x[1])+'</h3><p>'+esc(x[2])+'</p></div></article>').join("")+'</div>'}
    function renderMap(){app.innerHTML='<section class="map-section">'+heading("KNOWLEDGE MAP","先搭骨架，再填题目","每个节点用“概念—公式—易错—典题”四问检查。")+'<h3>物理全板块主线</h3><div class="physics-map">'+DATA.physicsMap.map((x,i)=>'<article><i>'+(i+1)+'</i><div><h4>'+esc(x[0])+'</h4><p>'+esc(x[1])+'</p></div></article>').join("")+'</div><h3>数学模型识别卡</h3><div class="models">'+DATA.mathModels.map(x=>'<article class="model"><header><b>'+esc(x.mark)+'</b><h4>'+esc(x.title)+'</h4></header><dl><dt>触发</dt><dd>'+esc(x.trigger)+'</dd><dt>链条</dt><dd>'+esc(x.chain)+'</dd><dt>易错</dt><dd>'+esc(x.trap)+'</dd></dl></article>').join("")+'</div></section>'}
    function renderQuestions(){const qs=DATA.problems.filter(x=>x.subject===state.subject);app.innerHTML=heading("CURATED PRACTICE","中上至偏高题组","依据公开中考题的高频母题和经典模型重组，不建议一节课全做。")+'<div class="subjects"><button data-subject="物理" class="'+(state.subject==="物理"?"active":"")+'">物理 · 9题</button><button data-subject="数学" class="'+(state.subject==="数学"?"active":"")+'">数学 · 10题</button></div><div class="problem-list">'+qs.map((q,i)=>'<article class="problem '+(state.done.includes(q.id)?"done":"")+'"><div class="meta"><span class="no">'+String(i+1).padStart(2,"0")+'</span><span>'+esc(q.topic)+'</span><b class="level '+(q.level==="偏高"?"hard":"")+'">'+q.level+'</b></div><p class="source">题型来源：'+esc(q.source)+'</p><p class="question">'+esc(q.prompt)+'</p><div class="actions"><button data-answer="'+q.id+'">查看提示与解析</button><label><input data-done="'+q.id+'" type="checkbox" '+(state.done.includes(q.id)?"checked":"")+'>已完成</label></div><div class="answer" id="answer-'+q.id+'"><p><b>提示</b>'+esc(q.hint)+'</p><p><b>解析</b>'+esc(q.answer)+'</p></div></article>').join("")+'</div>'}
    function render(){document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view));document.querySelector("#count").textContent=state.done.length+"/19";state.view==="plan"?renderPlan():state.view==="map"?renderMap():renderQuestions()}
    document.addEventListener("click",e=>{const v=e.target.closest("[data-view]");if(v){state.view=v.dataset.view;render();return}const s=e.target.closest("[data-subject]");if(s){state.subject=s.dataset.subject;render();return}const a=e.target.closest("[data-answer]");if(a){const box=document.querySelector("#answer-"+a.dataset.answer);box.classList.toggle("open");a.textContent=box.classList.contains("open")?"收起解析":"查看提示与解析"}});
    document.addEventListener("change",e=>{if(!e.target.dataset.done)return;const id=e.target.dataset.done;state.done=e.target.checked?[...new Set([...state.done,id])]:state.done.filter(x=>x!==id);localStorage.setItem("lesson-done",JSON.stringify(state.done));render()});render();
  </script>
</body></html>
